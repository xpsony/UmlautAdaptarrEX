name: Release

on:
  release:
    types:
      - published

permissions:
  contents: read

concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

env:
  # Public Docker Hub image. Authentication uses a Docker Hub access token
  # stored as a repository secret. Visibility (private/public) is configured
  # on the Docker Hub repository itself; the workflow does not change it.
  #
  # Required repository secrets:
  #   - DOCKERHUB_USERNAME: Docker Hub user that owns the image namespace
  #   - DOCKERHUB_TOKEN:    Docker Hub access token with read/write/delete
  #
  # Optional repository variable (Settings → Secrets and variables →
  # Actions → Variables):
  #   - DOCKERHUB_IMAGE: full image name, e.g. `myuser/myfork`. If unset,
  #                     the fallback below is used. Forks override this
  #                     variable to retarget the release without editing
  #                     this file.
  REGISTRY: docker.io
  IMAGE_NAME: ${{ vars.DOCKERHUB_IMAGE || 'lexfi/umlautadaptarrex' }}

jobs:
  quality:
    uses: ./.github/workflows/verify.yml

  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        include:
          # Native runners per architecture eliminate QEMU emulation, which
          # was the dominant cost in the previous single-runner cross-build.
          # `ubuntu-24.04-arm` is free on public repos; on private repos it
          # requires a Team or Enterprise plan with ARM runners enabled.
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Prepare platform pair
        id: prep
        shell: bash
        run: |
          platform="${{ matrix.platform }}"
          echo "pair=${platform//\//-}" >> "$GITHUB_OUTPUT"

      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          pull: true
          platforms: ${{ matrix.platform }}
          build-args: |
            APP_VERSION=${{ github.event.release.tag_name }}
          labels: |
            org.opencontainers.image.title=UmlautAdaptarrEX
            org.opencontainers.image.description=Umlaut/German-title proxy for Sonarr/Radarr/Lidarr/Readarr
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.url=https://hub.docker.com/r/${{ env.IMAGE_NAME }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ github.event.release.tag_name }}
            org.opencontainers.image.licenses=MIT
          # Push by content digest only; the merge job assembles the
          # multi-arch manifest with the actual tags.
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          # Per-platform cache scopes — amd64 and arm64 produce different
          # layers, sharing a scope would just thrash.
          cache-from: |
            type=gha,scope=release-${{ steps.prep.outputs.pair }}
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-${{ steps.prep.outputs.pair }}
          cache-to: |
            type=gha,mode=max,scope=release-${{ steps.prep.outputs.pair }}
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-${{ steps.prep.outputs.pair }},mode=max

      - name: Export digest
        shell: bash
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ steps.prep.outputs.pair }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge multi-arch manifest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tag args
        id: tags
        shell: bash
        run: |
          set -euo pipefail
          base="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          tag="${{ github.event.release.tag_name }}"
          args=(-t "${base}:${tag}")
          if [ "${{ github.event.release.prerelease }}" = "false" ]; then
            args+=(-t "${base}:latest")
          fi
          echo "args=${args[*]}" >> "$GITHUB_OUTPUT"

      - name: Create manifest list and push
        working-directory: /tmp/digests
        shell: bash
        run: |
          set -euo pipefail
          docker buildx imagetools create ${{ steps.tags.outputs.args }} \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.event.release.tag_name }}
